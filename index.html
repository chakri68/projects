<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chakri Labs — Project Archive</title>
    <meta
      name="description"
      content="A living archive of projects, experiments, simulations, tools, and side quests — automatically catalogued from GitHub."
    />
    <link rel="canonical" href="https://projects.chakri.me/" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta name="author" content="Chakri" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chakri Labs" />
    <meta property="og:title" content="Chakri Labs — Project Archive" />
    <meta
      property="og:description"
      content="A living archive of projects, experiments, simulations, tools, and side quests — automatically catalogued from GitHub."
    />
    <meta property="og:url" content="https://projects.chakri.me/" />
    <meta
      property="og:image"
      content="https://projects.chakri.me/og-image.png"
    />
    <meta property="og:image:width" content="1449" />
    <meta property="og:image:height" content="815" />
    <meta
      property="og:image:alt"
      content="Chakri Labs — a living archive of projects and experiments."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chakri Labs — Project Archive" />
    <meta
      name="twitter:description"
      content="A living archive of projects, experiments, simulations, tools, and side quests."
    />
    <meta
      name="twitter:image"
      content="https://projects.chakri.me/og-image.png"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Chakri Labs",
        "url": "https://projects.chakri.me/",
        "description": "A living archive of projects, experiments, simulations, tools, and side quests — automatically catalogued from GitHub."
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Pixel font: display=block so it never flashes a layout-shifting fallback. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block"
      rel="stylesheet"
    />
    <!-- Body mono: display=swap. -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Boot mask: pure-black with no visible content until the app has mounted
         and its styles are applied, then reveal — kills the flash of unstyled
         HTML (Vite injects CSS via JS in dev; also guards a slow first load). -->
    <style>
      html { background: #000; }
      body { visibility: hidden; }
    </style>
    <script>
      addEventListener("DOMContentLoaded", function () {
        requestAnimationFrame(function () {
          document.body.style.visibility = "visible";
        });
      });
    </script>
    <noscript><style>body { visibility: visible; }</style></noscript>
    <!-- Amber Phosphor theme tokens — single source of truth -->
    <link rel="stylesheet" href="https://theme.chakri.me/tokens.css" />
  </head>
  <body>
    <!-- Intro overlay lives in the DOM from first paint so the app never flashes
         unstyled; JS adds .booted once the pixel font has loaded. -->
    <div id="intro" class="intro booting" aria-hidden="true">
      <div class="intro-title">CHAKRI LABS</div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
